services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gestao
      POSTGRES_PASSWORD: gestao
      POSTGRES_DB: gestao_estoque
    ports:
      - "5432:5432"
    volumes:
      - gestao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestao -d gestao_estoque"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3011:3011"
    environment:
      DATABASE_URL: postgresql://gestao:gestao@postgres:5432/gestao_estoque?schema=public
      PORT: "3011"
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3011/api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3011/api
    depends_on:
      - api

volumes:
  gestao_postgres_data:
