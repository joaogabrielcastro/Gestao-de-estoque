services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gestao
      POSTGRES_PASSWORD: gestao
      POSTGRES_DB: gestao_estoque
    ports:
      - "5432:5432"
    volumes:
      - gestao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestao -d gestao_estoque"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3011:3011"
    environment:
      DATABASE_URL: postgresql://gestao:gestao@postgres:5432/gestao_estoque?schema=public
      PORT: "3011"
      HOST: "0.0.0.0"
      CORS_ORIGIN: http://localhost:3000
      API_RATE_LIMIT_MAX: "300"
      ENABLE_GLOBAL_SEARCH: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3011/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3011/api
    ports:
      - "3000:3000"
    environment:
      # Browser (cliente): acessa a API publicada no host
      NEXT_PUBLIC_API_URL: http://localhost:3011/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_GLOBAL_SEARCH: "false"
      # Server Components dentro do container: use o hostname do serviço Docker
      API_URL: http://api:3011/api
    depends_on:
      api:
        condition: service_healthy

volumes:
  gestao_postgres_data:
